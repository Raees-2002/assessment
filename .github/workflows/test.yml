name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run lint
        run: npx eslint .

      - name : Run npm audit
        run: npm audit --audit-level=high

      - name : Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          severity: "HIGH,CRITICAL"

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/assessment:test .

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/assessment:test

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker system prune -a -f || true
            docker pull rafeel124/assessment:test
            docker pull rafeel124/assessment:test
            docker ps -q --filter "publish=3000" | xargs -r docker stop
            docker ps -a -q --filter "publish=3000" | xargs -r docker rm
            docker run -d -p 3000:3000 --name assessment rafeel124/assessment:test
      
      
      - name: Notify Slack
        if: always()
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data "{\"text\":\"CI/CD Pipeline Status: ${{ job.status }}\"}" \
          ${{ secrets.SLACK_WEBHOOK }}